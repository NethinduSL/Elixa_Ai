<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Interactive AI with animated eyes that responds to your messages">
  <title>Elixa AI Eyes</title>
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css" rel="stylesheet">
  <link href="badu.css" rel="stylesheet">
</head>
<body>
      <div class="header-controls">
      <div>
        <button class="control-btn" id="dropdownToggle">
          <i class="fa-solid fa-caret-down"></i>
          <span id="currentModel">Elixa</span>
        </button>
        <div class="dropdown" id="dropdownMenu">
          <div class="dropdown-item" data-model="elixa">Elixa <i class="fa-solid fa-heart"></i></div>
          <div class="dropdown-item" data-model="talkai">TalkAI <i class="fa-solid fa-robot"></i></div>
          <div class="dropdown-item" data-model="whitecream">Whitecream <i class="fa-solid fa-pen"></i></div>
          <div class="dropdown-item" data-model="dolphin">Dolphin <i class="fa-solid fa-fish"></i></div>
          <div class="dropdown-item" data-model="notegpt">NoteGPT <i class="fa-solid fa-note-sticky"></i></div>
          <div class="dropdown-item" data-model="zonerai">ZonerAI <i class="fa-solid fa-image"></i></div>
        </div>
      </div>
      <div>
        <button class="control-btn" id="darkModeToggle" title="Toggle Dark Mode">
          <i class="fas fa-moon"></i>
        </button>
        <button class="control-btn" id="chatModeToggle" title="Toggle Chat Mode">
          <i class="fas fa-comment"></i>
        </button>
      </div>
    </div>
  
  <h1>Elixa AI</h1>
  
  <div class="eyes-container">
    <div class="eye" id="eye1"></div>
    <div class="eye" id="eye2"></div>
  </div>
  <div class="chat-box">
    <input type="text" id="userInput" placeholder="Talk to AI..." aria-label="Type your message here" />
    <button id="sendButton" onclick="sendMessage()">Send</button>
  </div>
  <div class="response" id="response"></div>
  <button class="stop-button" id="stopButton" style="display: none;"><i class="fa-solid fa-circle-stop"></i></button>
  <script src="ai.js"></script>
</body>
</html>
